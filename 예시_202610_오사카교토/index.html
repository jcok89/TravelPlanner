// ===== 렌더링 =====
const COLOR = {amber:'bg-amber-500', emerald:'bg-emerald-500', rose:'bg-rose-500', violet:'bg-violet-500'};
const maps = {}; // id -> leaflet map (lazy)

function buildNav(){
  const nav = document.getElementById('nav');
  const items = [{id:'overview',label:'개요·예약'},{id:'compare',label:'패키지 비교'}]
    .concat(DAYS.map((d,i)=>({id:d.id,label:`D${i+1} ${d.date}(${d.dow}) ${d.city}`})));
  nav.innerHTML = items.map(it=>`<button class="chip whitespace-nowrap text-sm px-3 py-1.5 rounded-full bg-gray-100" data-tab="${it.id}" onclick="showTab('${it.id}')">${it.label}</button>`).join('');
}
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c.dataset.tab===id));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='overview'){ initMap('overviewMap', overviewLayers()); }   // 탭 최초 표시 때 lazy 초기화
  const day = DAYS.find(d=>d.id===id);
  if(day){ initDayMap(day); }
}

function overviewLayers(){
  const cityPins=[{n:'오사카',c:[34.6937,135.5023]},{n:'나라',c:[34.6851,135.8430]},{n:'교토',c:[35.0116,135.7681]}];
  return (map)=>{
    const bounds=[];
    cityPins.forEach(p=>{ L.marker(p.c).addTo(map).bindPopup(p.n); bounds.push(p.c); });
    L.polyline(cityPins.map(p=>p.c),{color:'#4e4376',dashArray:'6'}).addTo(map);
    map.fitBounds(bounds,{padding:[40,40]});
  };
}

function initMap(divId, layerFn){
  if(maps[divId]){ maps[divId].invalidateSize(); return; }
  const m = L.map(divId,{scrollWheelZoom:false});
  L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3'],maxZoom:20}).addTo(m);
  layerFn(m);
  maps[divId]=m;
  setTimeout(()=>m.invalidateSize(),100);
}

function initDayMap(day){
  const divId = 'map-'+day.id;
  initMap(divId,(m)=>{
    const pts=[];
    day.stops.forEach((s,i)=>{
      const icon=L.divIcon({className:'',html:`<div class="num-pin">${i+1}</div>`,iconSize:[26,26]});
      L.marker(s.coord,{icon}).addTo(m).bindPopup(`${i+1}. ${s.title}`);
      if(pts.length===0 || pts[pts.length-1][0]!==s.coord[0] || pts[pts.length-1][1]!==s.coord[1]) pts.push(s.coord);
    });
    if(pts.length>1) L.polyline(pts,{color:'#111827'}).addTo(m);
    m.fitBounds(pts,{padding:[40,40]});
  });
}

function dirUrl(a,b,mode){ return `https://www.google.com/maps/dir/?api=1&origin=${a[0]},${a[1]}&destination=${b[0]},${b[1]}&travelmode=${mode||'transit'}`; }
function searchUrl(q){ return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`; }

function renderDays(){
  const wrap = document.getElementById('days');
  wrap.innerHTML = DAYS.map((d,di)=>{
    const stops = d.stops.map((s,i)=>{
      const prev = i>0?d.stops[i-1]:null;
      const dir = prev?`<div class="ml-3 my-1 text-xs text-gray-500 flex items-center gap-2">
        <span>↳ ${s.move?s.move.label:'이동'}</span>
        <a class="no-print underline" target="_blank" href="${dirUrl(prev.coord,s.coord,s.move?s.move.mode:'transit')}">길찾기</a></div>`:'';
      const links = (s.links||[]).map(l=>`<a target="_blank" href="${l.url}" class="inline-block text-xs mr-2 mt-1 px-2 py-0.5 rounded bg-gray-100 hover:bg-gray-200">${l.label}</a>`).join('');
      const badge = s.badge?`<span class="text-xs ml-2 px-2 py-0.5 rounded-full bg-black text-white">${s.badge}</span>`:'';
      return `${dir}
      <div class="flex gap-3 ${s.hl?'bg-amber-50':''} rounded-lg p-2">
        <div class="flex flex-col items-center">
          <div class="num-pin">${i+1}</div>
          <div class="text-xs text-gray-400 mt-1">${s.t}</div>
        </div>
        <div class="flex-1">
          <div class="font-semibold">${s.icon} ${s.title}${badge}
            <a target="_blank" href="${searchUrl(s.g)}" class="no-print text-xs text-blue-500 ml-1">지도↗</a></div>
          <div class="text-sm text-gray-600 mt-0.5">${s.desc||''}</div>
          <div>${links}</div>
        </div>
      </div>`;
    }).join('');
    const alts = (d.alts||[]).map(a=>`<div class="sel cursor-pointer border rounded-lg p-3 text-sm" onclick="toggleSel(this,'${d.id}-${a.tag}')">
      <div class="font-semibold">${a.tag} · ${a.title}</div><div class="text-gray-600">${a.desc}</div></div>`).join('');
    return `<section id="tab-${d.id}" class="tab">
      <div class="flex items-center gap-2 mb-1">
        <span class="w-3 h-3 rounded-full ${COLOR[d.color]}"></span>
        <h2 class="text-xl font-bold">D${di+1} · ${d.date}(${d.dow}) ${d.flag} ${d.city}</h2>
      </div>
      <p class="text-sm text-gray-500 mb-1">${d.title} · 🌇 일몰 ${d.sunset}</p>
      ${d.note?`<p class="text-xs bg-yellow-50 border border-yellow-200 rounded p-2 mb-3">📌 ${d.note}</p>`:''}
      <div id="map-${d.id}" class="map mb-4"></div>
      <div class="space-y-1 mb-4">${stops}</div>
      ${alts?`<h3 class="font-bold text-sm mb-2">🔀 선택지/대안 <span class="text-xs text-gray-400">(클릭 저장)</span></h3><div class="grid md:grid-cols-2 gap-2">${alts}</div>`:''}
    </section>`;
  }).join('');
}

function renderOverview(){
  document.getElementById('confirmed').innerHTML = CONFIRMED.map(c=>`
    <div class="bg-white rounded-xl p-3 shadow-sm flex gap-3 items-start">
      <div class="text-2xl">${c.icon}</div>
      <div><div class="text-xs text-gray-400">${c.t} <span class="ml-1 px-1.5 py-0.5 bg-gray-800 text-white rounded">확정</span></div>
      <div class="text-sm font-medium">${c.v}</div></div></div>`).join('');
  document.getElementById('resv').innerHTML = RESV.map((r,i)=>`
    <label class="flex items-start gap-2 bg-white rounded-xl p-3 shadow-sm cursor-pointer">
      <input type="checkbox" class="mt-1" data-k="resv-${i}" onchange="saveCheck(this)">
      <div class="flex-1">
        <div class="text-sm font-medium">${r.label} <span class="text-xs ml-1 px-2 py-0.5 rounded-full ${U[r.u].c}">${U[r.u].t}</span></div>
        <div class="text-xs text-gray-500">${r.why}</div>
        ${r.url?`<a target="_blank" href="${r.url}" class="no-print text-xs text-blue-500">예약/정보 ↗</a>`:''}
      </div></label>`).join('');
  document.getElementById('transport').innerHTML = TRANSPORT;
  document.getElementById('season').innerHTML = SEASON;
  document.getElementById('compare').innerHTML = COMPARE;
}

// ===== 상태 저장 (localStorage) =====
function toggleSel(el,key){ el.classList.toggle('selected'); localStorage.setItem('sel-'+key, el.classList.contains('selected')?'1':''); }
function saveCheck(el){ localStorage.setItem(el.dataset.k, el.checked?'1':''); }
function restore(){
  document.querySelectorAll('[data-k]').forEach(el=>{ if(localStorage.getItem(el.dataset.k)==='1') el.checked=true; });
  document.querySelectorAll('.sel').forEach(el=>{ const oc=el.getAttribute('onclick')||''; const m=oc.match(/'([^']+)'\)/); if(m && localStorage.getItem('sel-'+m[1])==='1') el.classList.add('selected'); });
}

// ===== KML 내보내기 =====
function downloadKML(){
  let ph='';
  DAYS.forEach((d,di)=>{ d.stops.forEach((s,i)=>{
    ph+=`<Placemark><name>D${di+1}-${i+1} ${s.title}</name><description>${d.date}(${d.dow}) ${s.t} ${(s.desc||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</description><Point><coordinates>${s.coord[1]},${s.coord[0]},0</coordinates></Point></Placemark>`;
  });});
  const kml=`<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>오사카교토 3박4일(예시)</name>${ph}</Document></kml>`;
  const blob=new Blob([kml],{type:'application/vnd.google-earth.kml+xml'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='travel_pins.kml'; a.click();
}

// ===== init =====
buildNav(); renderOverview(); renderDays(); restore();
showTab('overview');
</script>
