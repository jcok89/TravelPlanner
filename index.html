<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 허브 ✈️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .hero-gradient { background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%); }
    </style>
</head>
<body class="text-gray-800 antialiased">
    <!-- Header -->
    <header class="hero-gradient text-white shadow-xl">
        <div class="max-w-5xl mx-auto px-4 py-16 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">✈️ Travel Hub</h1>
            <p class="text-lg md:text-xl opacity-90">우리가 함께하는 모든 여행의 기록</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-12">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold text-gray-800">나의 여행 목록</h2>
            <span class="bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full">총 1개의 여행</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 예시(가상) 여행 카드 — 배포 키트 검증용 -->
            <a href="./예시_202610_오사카교토/index.html" class="group block bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 overflow-hidden border border-gray-100">
                <div class="h-48 overflow-hidden relative flex items-center justify-center" style="background:linear-gradient(135deg,#e11d48,#7c3aed)">
                    <span class="text-6xl">🇯🇵</span>
                    <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm text-gray-800 text-xs font-bold px-3 py-1 rounded-full shadow-sm">2026년 10월</div>
                    <div class="absolute top-4 left-4 bg-amber-400 text-amber-900 text-xs font-bold px-2 py-1 rounded-full shadow-sm">예시 · 가상</div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-blue-600 transition-colors">(예시) 오사카 · 교토 3박4일 🇯🇵</h3>
                    <p class="text-gray-500 text-sm mb-4">오사카 · 나라 · 교토 (3박 4일) · 배포 키트 검증용 샘플</p>
                    <div class="flex items-center text-blue-500 text-sm font-medium">
                        일정 보기 <span class="ml-1 group-hover:translate-x-1 transition-transform">→</span>
                    </div>
                </div>
            </a>

            <!--
              ▼▼▼ 새 여행이 완성되면 아래 카드 템플릿을 복사해 이 위치에 추가하세요.
              (travel-plan-builder 스킬이 자동으로 넣어줍니다. 수동 추가 시 참고)
              - href / img src 의 폴더명·커버 이미지 경로
              - 제목 · 부제(도시·기간) · 날짜 배지 를 바꾸면 됩니다.
              그리고 위의 "총 N개의 여행" 숫자도 함께 올려주세요.

            <a href="./YYYYMM_지역명/index.html" class="group block bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 overflow-hidden border border-gray-100">
                <div class="h-48 bg-gray-200 overflow-hidden relative">
                    <img src="./YYYYMM_지역명/cover.jpg" alt="지역명" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm text-gray-800 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                        2027년 X월
                    </div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-blue-600 transition-colors">여행 제목 ✈️</h3>
                    <p class="text-gray-500 text-sm mb-4">도시1 · 도시2 · 도시3 (N박 M일)</p>
                    <div class="flex items-center text-blue-500 text-sm font-medium">
                        일정 보기 <span class="ml-1 group-hover:translate-x-1 transition-transform">→</span>
                    </div>
                </div>
            </a>
            ▲▲▲ 카드 템플릿 끝 -->

            <!-- Placeholder (여행이 하나라도 추가되면 지워도 됩니다) -->
            <div class="bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center p-8 text-center h-full min-h-[300px]">
                <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center mb-4 text-2xl">
                    🌍
                </div>
                <h3 class="text-lg font-bold text-gray-500 mb-1">새로운 여행</h3>
                <p class="text-sm text-gray-400">다음 목적지는 어디일까요?</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-8 text-gray-400 text-sm mt-12 border-t">
        <p>&copy; My Travel Hub. All memories reserved.</p>
    </footer>
</body>
</html>
